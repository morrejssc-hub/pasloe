<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasloe - Webhook Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            /* slate-900 */
            color: #f8fafc;
            /* slate-50 */
        }

        /* Glassmorphism utilities */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            /* slate-800 with opacity */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Transitions */
        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.3s ease;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="antialiased min-h-screen bg-slate-900 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-900 to-indigo-950">

    <div id="app" v-cloak class="min-h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="glass sticky top-0 z-40 border-b border-slate-700/50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-primary-600 flex items-center justify-center shadow-lg">
                            <i data-lucide="webhook" class="w-5 h-5 text-white"></i>
                        </div>
                        <span
                            class="font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                            Pasloe Webhooks
                        </span>
                    </div>

                    <div class="flex items-center gap-4">
                        <button @click="logout" v-if="apiKey"
                            class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 text-sm font-medium">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            Disconnect
                        </button>
                        <a href="/docs" target="_blank" class="text-slate-400 hover:text-white transition-colors">
                            <i data-lucide="file-json" class="w-5 h-5"></i>
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

            <!-- Auth View -->
            <div v-if="!apiKey" class="flex flex-col items-center justify-center h-[60vh]">
                <div
                    class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl shadow-indigo-500/10 border border-slate-700/50 transform transition-all">
                    <div class="text-center mb-8">
                        <div
                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 mb-4 border border-slate-700">
                            <i data-lucide="key" class="w-8 h-8 text-primary-500"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-white tracking-tight">Authentication Required</h2>
                        <p class="text-slate-400 mt-2 text-sm">Please provide your valid X-API-Key to manage webhooks.
                        </p>
                    </div>

                    <form @submit.prevent="saveApiKey" class="space-y-6">
                        <div>
                            <div class="relative">
                                <i data-lucide="lock"
                                    class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                                <input type="password" v-model="tempApiKey" placeholder="Enter X-API-Key..."
                                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                                    required>
                            </div>
                        </div>
                        <button type="submit"
                            class="w-full flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-500 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-lg shadow-primary-500/25 filter hover:brightness-110">
                            <span>Connect</span>
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Dashboard View -->
            <div v-else class="space-y-6">

                <!-- Header & Actions -->
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-white sm:text-3xl tracking-tight">Dashboard</h1>
                        <p class="text-slate-400 mt-1">Manage event subscriptions and view data.</p>
                    </div>
                    <button v-if="currentTab === 'webhooks'" @click="showCreateModal = true"
                        @click="showCreateModal = true"
                        class="inline-flex items-center justify-center gap-2 bg-white text-slate-900 hover:bg-slate-100 font-semibold py-2.5 px-5 rounded-xl transition-all shadow-lg hover:shadow-white/20">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        New Webhook
                    </button>
                </div>

                <!-- Tabs -->
                <div class="border-b border-slate-700/50">
                    <nav class="-mb-px flex space-x-6" aria-label="Tabs">
                        <button @click="currentTab = 'webhooks'"
                            :class="currentTab === 'webhooks' ? 'border-primary-500 text-primary-400' : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-500'"
                            class="whitespace-nowrap flex py-3 px-1 border-b-2 font-medium text-sm transition-colors">
                            Webhooks
                        </button>
                        <button @click="currentTab = 'sources'"
                            :class="currentTab === 'sources' ? 'border-primary-500 text-primary-400' : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-500'"
                            class="whitespace-nowrap flex py-3 px-1 border-b-2 font-medium text-sm transition-colors">
                            Sources
                        </button>
                        <button @click="currentTab = 'events'"
                            :class="currentTab === 'events' ? 'border-primary-500 text-primary-400' : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-500'"
                            class="whitespace-nowrap flex py-3 px-1 border-b-2 font-medium text-sm transition-colors">
                            Events
                        </button>
                    </nav>
                </div>

                <!-- Loading State -->
                <div v-if="loading" class="flex flex-col justify-center items-center py-20 space-y-4">
                    <i data-lucide="loader-2" class="w-8 h-8 text-primary-500 animate-spin"></i>
                    <p class="text-slate-400 animate-pulse">Fetching data...</p>
                </div>

                <!-- Webhooks View -->
                <template v-else-if="currentTab === 'webhooks'">

                    <!-- Empty State -->
                    <div v-else-if="webhooks.length === 0"
                        class="glass rounded-2xl p-12 text-center border border-slate-700/50 shadow-xl">
                        <div
                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 md:mb-4 border border-slate-700">
                            <i data-lucide="bell-off" class="w-8 h-8 text-slate-400"></i>
                        </div>
                        <h3 class="text-lg font-medium text-white">No webhooks found</h3>
                        <p class="mt-2 text-slate-400 max-w-sm mx-auto">Get started by creating a new webhook to receive
                            real-time event notifications.</p>
                        <button @click="showCreateModal = true"
                            class="mt-6 inline-flex items-center gap-2 text-primary-400 hover:text-primary-300 font-medium transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            Add your first webhook
                        </button>
                    </div>

                    <!-- Webhook List -->
                    <div v-else class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                        <div v-for="webhook in webhooks" :key="webhook.id"
                            class="glass rounded-xl p-6 border border-slate-700/50 hover:border-slate-600 transition-all group relative overflow-hidden">
                            <!-- Decorative glow -->
                            <div
                                class="absolute -right-8 -top-8 w-32 h-32 bg-primary-500/10 rounded-full blur-2xl group-hover:bg-primary-500/20 transition-all pointer-events-none">
                            </div>

                            <div class="flex justify-between items-start mb-4 relative z-10">
                                <div class="flex items-center gap-2 max-w-[80%]">
                                    <div class="p-2 rounded-lg bg-slate-800/80 border border-slate-700">
                                        <i data-lucide="link-2" class="w-4 h-4 text-emerald-400"></i>
                                    </div>
                                    <span class="font-medium text-slate-200 truncate" :title="webhook.url">
                                        {{ new URL(webhook.url).hostname }}
                                    </span>
                                </div>
                                <button @click="confirmDelete(webhook)"
                                    class="text-slate-500 hover:text-red-400 hover:bg-red-400/10 p-2 rounded-lg transition-colors"
                                    title="Delete Webhook">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>

                            <div class="space-y-3 relative z-10">
                                <div class="text-sm">
                                    <p class="text-slate-500 mb-1 text-xs uppercase tracking-wider font-semibold">
                                        Endpoint</p>
                                    <p class="text-slate-300 truncate font-mono text-xs bg-slate-900/50 p-2 rounded-md border border-slate-800"
                                        :title="webhook.url">{{ webhook.url }}</p>
                                </div>

                                <div>
                                    <p class="text-slate-500 mb-1.5 text-xs uppercase tracking-wider font-semibold">
                                        Event Types</p>
                                    <div class="flex flex-wrap gap-1.5">
                                        <span v-if="webhook.event_types && webhook.event_types.length > 0"
                                            v-for="type in webhook.event_types" :key="type"
                                            class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-indigo-500/10 text-indigo-300 border border-indigo-500/20">
                                            {{ type }}
                                        </span>
                                        <span v-else
                                            class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-800 text-slate-400 border border-slate-700">
                                            All Events
                                        </span>
                                    </div>
                                </div>

                                <div
                                    class="pt-4 mt-4 border-t border-slate-700/50 flex justify-between items-center text-xs text-slate-500">
                                    <span class="font-mono text-[10px]" :title="webhook.id">{{ webhook.id.split('-')[0]
                                        }}...</span>
                                    <span>{{ new Date(webhook.created_at).toLocaleDateString() }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Sources View -->
                <template v-else-if="currentTab === 'sources'">
                    <div v-if="sources.length === 0"
                        class="glass rounded-2xl p-12 text-center border border-slate-700/50 shadow-xl">
                        <div
                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 md:mb-4 border border-slate-700">
                            <i data-lucide="server" class="w-8 h-8 text-slate-400"></i>
                        </div>
                        <h3 class="text-lg font-medium text-white">No sources found</h3>
                    </div>

                    <div v-else class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                        <div v-for="source in sources" :key="source.id"
                            class="glass rounded-xl p-6 border border-slate-700/50 hover:border-slate-600 transition-all">
                            <div class="flex items-center gap-2 mb-4">
                                <i data-lucide="server" class="w-5 h-5 text-indigo-400"></i>
                                <span class="font-bold text-white tracking-wide" :title="source.id">{{ source.id
                                    }}</span>
                            </div>
                            <div class="space-y-2 text-sm text-slate-300">
                                <p><span class="text-slate-500 font-semibold uppercase text-xs">Kind:</span> {{
                                    source.kind }}</p>
                                <p><span class="text-slate-500 font-semibold uppercase text-xs">Registered At:</span> {{
                                    new Date(source.registered_at).toLocaleString() }}</p>
                                <div v-if="Object.keys(source.metadata).length > 0">
                                    <span class="text-slate-500 font-semibold uppercase text-xs">Metadata:</span>
                                    <pre
                                        class="mt-1 bg-slate-900/50 p-2 rounded text-xs overflow-x-auto text-emerald-300">{{ JSON.stringify(source.metadata, null, 2) }}</pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Events View -->
                <template v-else-if="currentTab === 'events'">
                    <div v-if="events.length === 0"
                        class="glass rounded-2xl p-12 text-center border border-slate-700/50 shadow-xl">
                        <div
                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 md:mb-4 border border-slate-700">
                            <i data-lucide="activity" class="w-8 h-8 text-slate-400"></i>
                        </div>
                        <h3 class="text-lg font-medium text-white">No events found</h3>
                    </div>

                    <div v-else class="space-y-4">
                        <div v-for="event in events" :key="event.id"
                            class="glass rounded-xl p-5 border border-slate-700/50 hover:border-slate-600 transition-all flex flex-col md:flex-row gap-4">
                            <div class="md:w-1/3 space-y-2">
                                <div class="flex items-center gap-2">
                                    <span
                                        class="px-2 py-1 rounded bg-primary-500/20 text-primary-300 text-xs font-bold uppercase tracking-wider">{{
                                        event.type }}</span>
                                </div>
                                <div class="text-sm text-slate-400 flex items-center gap-1.5" :title="event.source_id">
                                    <i data-lucide="server" class="w-3.5 h-3.5"></i>
                                    <span class="truncate">{{ event.source_id }}</span>
                                </div>
                                <div class="text-xs text-slate-500 flex items-center gap-1.5">
                                    <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                    {{ new Date(event.ts).toLocaleString() }}
                                </div>
                            </div>
                            <div
                                class="md:w-2/3 bg-slate-900/80 rounded-lg p-3 border border-slate-800 overflow-x-auto">
                                <pre
                                    class="text-xs text-slate-300 font-mono">{{ JSON.stringify(event.data, null, 2) }}</pre>
                            </div>
                        </div>
                    </div>
                </template>

            </div>
        </main>

        <!-- Create Modal -->
        <Teleport to="body">
            <Transition name="fade">
                <div v-if="showCreateModal" class="fixed inset-0 z-50 overflow-y-auto">
                    <div class="flex items-end sm:items-center justify-center min-h-full p-4 text-center sm:p-0">

                        <!-- Backdrop -->
                        <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm transition-opacity"
                            @click="showCreateModal = false"></div>

                        <!-- Modal Panel -->
                        <div
                            class="relative glass rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-lg w-full border border-slate-700/60">

                            <div
                                class="px-6 py-5 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/40">
                                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                    <i data-lucide="webhook" class="w-5 h-5 text-primary-500"></i>
                                    Create Webhook
                                </h3>
                                <button @click="showCreateModal = false"
                                    class="text-slate-400 hover:text-white transition-colors">
                                    <i data-lucide="x" class="w-5 h-5"></i>
                                </button>
                            </div>

                            <form @submit.prevent="createWebhook" class="px-6 py-6 space-y-5 bg-slate-800/20">

                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Payload URL <span
                                            class="text-red-400">*</span></label>
                                    <input type="url" v-model="newWebhook.url"
                                        placeholder="https://example.com/callback"
                                        class="w-full bg-slate-900/80 border border-slate-700 rounded-lg py-2.5 px-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all sm:text-sm shadow-inner"
                                        required>
                                </div>

                                <div>
                                    <label
                                        class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-1.5">
                                        Event Types
                                        <span class="group relative cursor-help flex items-center">
                                            <i data-lucide="info" class="w-4 h-4 text-slate-500"></i>
                                            <div
                                                class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 p-2 bg-slate-800 border border-slate-700 rounded-lg shadow-xl text-xs text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10 text-center">
                                                Comma-separated list (e.g., key_press, mouse_click). Leave blank for all
                                                events.
                                            </div>
                                        </span>
                                    </label>
                                    <input type="text" v-model="newWebhook.eventTypesInput"
                                        placeholder="e.g. key_press, my_custom_event"
                                        class="w-full bg-slate-900/80 border border-slate-700 rounded-lg py-2.5 px-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all sm:text-sm font-mono text-sm shadow-inner">
                                </div>

                                <div>
                                    <label
                                        class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-1.5">
                                        Secret <span class="text-xs text-slate-500 font-normal">(Optional)</span>
                                    </label>
                                    <input type="password" v-model="newWebhook.secret"
                                        placeholder="Secret token for payload validation..."
                                        class="w-full bg-slate-900/80 border border-slate-700 rounded-lg py-2.5 px-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all sm:text-sm shadow-inner">
                                </div>

                                <div class="pt-4 mt-6 border-t border-slate-700/50 flex justify-end gap-3">
                                    <button type="button" @click="showCreateModal = false"
                                        class="px-4 py-2 bg-transparent text-slate-300 hover:text-white font-medium rounded-lg transition-colors text-sm">
                                        Cancel
                                    </button>
                                    <button type="submit" :disabled="isCreating"
                                        class="inline-flex items-center justify-center gap-2 px-5 py-2 bg-primary-600 hover:bg-primary-500 text-white font-medium rounded-lg transition-all shadow-lg shadow-primary-500/20 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                                        <i v-if="isCreating" data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                                        <span v-else>Create Webhook</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </Transition>
        </Teleport>

        <!-- Toasts container -->
        <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
            <TransitionGroup name="fade">
                <div v-for="toast in toasts" :key="toast.id"
                    class="glass px-4 py-3 rounded-xl shadow-lg border flex items-center gap-3 w-80 pointer-events-auto"
                    :class="{
                    'border-emerald-500/50 bg-emerald-500/10': toast.type === 'success',
                    'border-red-500/50 bg-red-500/10': toast.type === 'error',
                    'border-blue-500/50 bg-blue-500/10': toast.type === 'info'
                }">
                    <i v-if="toast.type === 'success'" data-lucide="check-circle-2"
                        class="w-5 h-5 text-emerald-400 shrink-0"></i>
                    <i v-if="toast.type === 'error'" data-lucide="alert-circle"
                        class="w-5 h-5 text-red-400 shrink-0"></i>
                    <i v-if="toast.type === 'info'" data-lucide="info" class="w-5 h-5 text-blue-400 shrink-0"></i>

                    <p class="text-sm font-medium text-white flex-1">{{ toast.message }}</p>

                    <button @click="removeToast(toast.id)" class="text-slate-400 hover:text-white shrink-0">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </TransitionGroup>
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const apiKey = ref('');
                const tempApiKey = ref('');
                const currentTab = ref('webhooks');
                const webhooks = ref([]);
                const sources = ref([]);
                const events = ref([]);
                const loading = ref(false);
                const showCreateModal = ref(false);
                const isCreating = ref(false);
                const toasts = ref([]);

                const newWebhook = ref({
                    url: '',
                    eventTypesInput: '',
                    secret: ''
                });

                // Initialize icons when dom updates
                const initIcons = async () => {
                    await nextTick();
                    lucide.createIcons();
                };

                const addToast = (message, type = 'info') => {
                    const id = Date.now();
                    toasts.value.push({ id, message, type });
                    setTimeout(() => removeToast(id), 5000);
                    initIcons();
                };

                const removeToast = (id) => {
                    toasts.value = toasts.value.filter(t => t.id !== id);
                };

                const getHeaders = () => {
                    return {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey.value
                    };
                };

                const saveApiKey = async () => {
                    if (!tempApiKey.value.trim()) return;

                    // Fast path local set
                    const key = tempApiKey.value.trim();

                    // Verify by attempting to fetch webhooks
                    loading.value = true;
                    try {
                        const res = await fetch('/webhooks', {
                            headers: { 'X-API-Key': key }
                        });

                        if (res.ok) {
                            apiKey.value = key;
                            localStorage.setItem('pasloe_api_key', key);
                            addToast('Successfully authenticated.', 'success');
                            await loadCurrentTab();
                        } else if (res.status === 403 || res.status === 401) {
                            addToast('Invalid API Key. Please try again.', 'error');
                        } else {
                            addToast(`Error: ${res.statusText}`, 'error');
                        }
                    } catch (err) {
                        addToast('Connection error. Is the server running?', 'error');
                    } finally {
                        loading.value = false;
                    }
                };

                const logout = () => {
                    apiKey.value = '';
                    tempApiKey.value = '';
                    webhooks.value = [];
                    sources.value = [];
                    events.value = [];
                    localStorage.removeItem('pasloe_api_key');
                    addToast('Logged out successfully.', 'info');
                };

                const loadCurrentTab = async () => {
                    if (currentTab.value === 'webhooks') await fetchWebhooks();
                    else if (currentTab.value === 'sources') await fetchSources();
                    else if (currentTab.value === 'events') await fetchEvents();
                };

                Vue.watch(currentTab, () => {
                    loadCurrentTab();
                });

                const fetchWebhooks = async () => {
                    if (!apiKey.value) return;

                    loading.value = true;
                    try {
                        const res = await fetch('/webhooks', { headers: getHeaders() });
                        if (!res.ok) {
                            if (res.status === 403 || res.status === 401) logout();
                            throw new Error('Failed to fetch webhooks');
                        }
                        webhooks.value = await res.json();
                    } catch (err) {
                        addToast(err.message, 'error');
                    } finally {
                        loading.value = false;
                        initIcons();
                    }
                };

                const fetchSources = async () => {
                    if (!apiKey.value) return;

                    loading.value = true;
                    try {
                        const res = await fetch('/sources', { headers: getHeaders() });
                        if (!res.ok) {
                            if (res.status === 403 || res.status === 401) logout();
                            throw new Error('Failed to fetch sources');
                        }
                        sources.value = await res.json();
                    } catch (err) {
                        addToast(err.message, 'error');
                    } finally {
                        loading.value = false;
                        initIcons();
                    }
                };

                const fetchEvents = async () => {
                    if (!apiKey.value) return;

                    loading.value = true;
                    try {
                        const res = await fetch('/events?limit=100&order=desc', { headers: getHeaders() });
                        if (!res.ok) {
                            if (res.status === 403 || res.status === 401) logout();
                            throw new Error('Failed to fetch events');
                        }
                        events.value = await res.json();
                    } catch (err) {
                        addToast(err.message, 'error');
                    } finally {
                        loading.value = false;
                        initIcons();
                    }
                };

                const createWebhook = async () => {
                    if (!newWebhook.value.url) return;

                    isCreating.value = true;
                    try {
                        // Parse event types
                        let event_types = null;
                        if (newWebhook.value.eventTypesInput.trim()) {
                            event_types = newWebhook.value.eventTypesInput
                                .split(',')
                                .map(s => s.trim())
                                .filter(s => s.length > 0);
                        }

                        const payload = {
                            url: newWebhook.value.url,
                            event_types,
                            secret: newWebhook.value.secret || null
                        };

                        const res = await fetch('/webhooks', {
                            method: 'POST',
                            headers: getHeaders(),
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) throw new Error('Failed to create webhook');

                        addToast('Webhook created successfully', 'success');
                        showCreateModal.value = false;

                        // Reset form
                        newWebhook.value = { url: '', eventTypesInput: '', secret: '' };

                        // Refresh list
                        await fetchWebhooks();
                    } catch (err) {
                        addToast(err.message, 'error');
                    } finally {
                        isCreating.value = false;
                    }
                };

                const confirmDelete = async (webhook) => {
                    if (!confirm(`Are you sure you want to delete the webhook for ${webhook.url}?`)) return;

                    try {
                        const res = await fetch(`/webhooks/${webhook.id}`, {
                            method: 'DELETE',
                            headers: getHeaders()
                        });

                        if (!res.ok) throw new Error('Failed to delete webhook');

                        addToast('Webhook deleted', 'success');
                        await fetchWebhooks();
                    } catch (err) {
                        addToast(err.message, 'error');
                    }
                };

                onMounted(() => {
                    // Check local storage for api key
                    const savedKey = localStorage.getItem('pasloe_api_key');
                    if (savedKey) {
                        apiKey.value = savedKey;
                        loadCurrentTab();
                    }
                    initIcons();
                });

                // Watch for modal state change to re-init icons
                Vue.watch(showCreateModal, (newVal) => {
                    if (newVal) {
                        setTimeout(initIcons, 50);
                    }
                });

                return {
                    apiKey,
                    tempApiKey,
                    currentTab,
                    webhooks,
                    sources,
                    events,
                    loading,
                    showCreateModal,
                    isCreating,
                    newWebhook,
                    toasts,
                    saveApiKey,
                    logout,
                    createWebhook,
                    confirmDelete,
                    removeToast
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
